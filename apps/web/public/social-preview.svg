<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="60%" stop-color="#080c0a"/>
      <stop offset="100%" stop-color="#060508"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="213" y1="0" x2="213" y2="640"/>
    <line x1="426" y1="0" x2="426" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="853" y1="0" x2="853" y2="640"/>
    <line x1="1066" y1="0" x2="1066" y2="640"/>
    <line x1="0" y1="128" x2="1280" y2="128"/>
    <line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="0" y1="384" x2="1280" y2="384"/>
    <line x1="0" y1="512" x2="1280" y2="512"/>
  </g>

  <!-- Price chart fill area -->
  <path d="M0 380 C80 360 160 320 240 290 C320 260 400 310 480 280 C560 250 640 220 720 240 C800 260 880 230 960 200 C1040 170 1120 180 1200 160 L1280 150 L1280 640 L0 640 Z"
    fill="url(#lineGrad)" opacity="0.6"/>

  <!-- Price chart line -->
  <path d="M0 380 C80 360 160 320 240 290 C320 260 400 310 480 280 C560 250 640 220 720 240 C800 260 880 230 960 200 C1040 170 1120 180 1200 160 L1280 150"
    fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>

  <!-- Secondary line (purple) -->
  <path d="M0 420 C80 400 160 380 240 350 C320 320 400 360 480 340 C560 310 640 290 720 300 C800 310 880 280 960 260 C1040 240 1120 250 1200 230 L1280 220"
    fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>

  <!-- Glow tip -->
  <circle cx="1280" cy="150" r="20" fill="rgba(16,185,129,0.12)"/>
  <circle cx="1280" cy="150" r="10" fill="rgba(16,185,129,0.25)"/>
  <circle cx="1280" cy="150" r="4" fill="#34d399" filter="url(#glow2)"/>

  <!-- Ambient emerald glow -->
  <circle cx="640" cy="320" r="300" fill="rgba(16,185,129,0.04)"/>

  <!-- Signal card 1: BUY BTC -->
  <g transform="translate(680, 100)">
    <rect width="200" height="80" rx="10" fill="rgba(10,10,12,0.9)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <rect x="0" y="12" width="3" height="56" rx="1.5" fill="#10b981"/>
    <rect x="12" y="20" width="44" height="18" rx="3" fill="rgba(16,185,129,0.15)"/>
    <text x="34" y="32" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#10b981">BUY</text>
    <text x="68" y="34" font-family="-apple-system,sans-serif" font-size="13" font-weight="bold" fill="rgba(255,255,255,0.9)">BTC/USD</text>
    <text x="68" y="50" font-family="monospace" font-size="11" fill="rgba(160,160,180,0.7)">$94,210</text>
    <rect x="12" y="62" width="176" height="3" rx="1.5" fill="rgba(255,255,255,0.07)"/>
    <rect x="12" y="62" width="154" height="3" rx="1.5" fill="rgba(16,185,129,0.65)"/>
    <text x="175" y="65" font-family="monospace" font-size="8" fill="rgba(16,185,129,0.7)">87%</text>
  </g>

  <!-- Signal card 2: SELL EUR/USD -->
  <g transform="translate(680, 200)">
    <rect width="200" height="80" rx="10" fill="rgba(10,10,12,0.9)" stroke="rgba(244,63,94,0.3)" stroke-width="1"/>
    <rect x="0" y="12" width="3" height="56" rx="1.5" fill="#f43f5e"/>
    <rect x="12" y="20" width="44" height="18" rx="3" fill="rgba(244,63,94,0.15)"/>
    <text x="34" y="32" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#f43f5e">SELL</text>
    <text x="68" y="34" font-family="-apple-system,sans-serif" font-size="13" font-weight="bold" fill="rgba(255,255,255,0.9)">EUR/USD</text>
    <text x="68" y="50" font-family="monospace" font-size="11" fill="rgba(160,160,180,0.7)">1.0832</text>
    <rect x="12" y="62" width="176" height="3" rx="1.5" fill="rgba(255,255,255,0.07)"/>
    <rect x="12" y="62" width="130" height="3" rx="1.5" fill="rgba(244,63,94,0.65)"/>
    <text x="175" y="65" font-family="monospace" font-size="8" fill="rgba(244,63,94,0.7)">74%</text>
  </g>

  <!-- Signal card 3: BUY XAU/USD -->
  <g transform="translate(680, 300)">
    <rect width="200" height="80" rx="10" fill="rgba(10,10,12,0.9)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <rect x="0" y="12" width="3" height="56" rx="1.5" fill="#10b981"/>
    <rect x="12" y="20" width="44" height="18" rx="3" fill="rgba(16,185,129,0.15)"/>
    <text x="34" y="32" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#10b981">BUY</text>
    <text x="68" y="34" font-family="-apple-system,sans-serif" font-size="13" font-weight="bold" fill="rgba(255,255,255,0.9)">XAU/USD</text>
    <text x="68" y="50" font-family="monospace" font-size="11" fill="rgba(160,160,180,0.7)">$2,648</text>
    <rect x="12" y="62" width="176" height="3" rx="1.5" fill="rgba(255,255,255,0.07)"/>
    <rect x="12" y="62" width="161" height="3" rx="1.5" fill="rgba(16,185,129,0.65)"/>
    <text x="175" y="65" font-family="monospace" font-size="8" fill="rgba(16,185,129,0.7)">91%</text>
  </g>

  <!-- Left content area -->
  <!-- Logo + name -->
  <g transform="translate(80, 120)">
    <!-- TC hexagon logo -->
    <polygon points="30,0 52,13 52,39 30,52 8,39 8,13" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1.5"/>
    <text x="30" y="34" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#10b981">TC</text>
  </g>

  <text x="148" y="148" font-family="-apple-system,sans-serif" font-size="22" font-weight="bold" fill="rgba(255,255,255,0.9)">TradeClaw</text>
  <text x="148" y="168" font-family="monospace" font-size="10" fill="rgba(16,185,129,0.7)" letter-spacing="3">OPEN SOURCE</text>

  <!-- Main headline -->
  <text x="80" y="240" font-family="-apple-system,sans-serif" font-size="48" font-weight="bold" fill="white">AI Trading</text>
  <text x="80" y="295" font-family="-apple-system,sans-serif" font-size="48" font-weight="bold" fill="white">Signals.</text>
  <text x="80" y="350" font-family="-apple-system,sans-serif" font-size="48" font-weight="bold" fill="#10b981">Open Source.</text>

  <!-- Subtitle -->
  <text x="80" y="400" font-family="-apple-system,sans-serif" font-size="18" fill="rgba(160,160,180,0.8)">Self-hosted · Free forever · Docker one-click deploy</text>

  <!-- Feature pills -->
  <g transform="translate(80, 430)">
    <rect width="120" height="26" rx="13" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="60" y="17" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#10b981">12+ Asset Pairs</text>
  </g>
  <g transform="translate(214" >
  </g>
  <g transform="translate(214, 430)">
    <rect width="130" height="26" rx="13" fill="rgba(139,92,246,0.1)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
    <text x="65" y="17" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#a78bfa">Backtesting</text>
  </g>
  <g transform="translate(358, 430)">
    <rect width="150" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="75" y="17" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Paper Trading</text>
  </g>
  <g transform="translate(522, 430)">
    <rect width="130" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="65" y="17" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Telegram Alerts</text>
  </g>

  <!-- URL -->
  <text x="80" y="510" font-family="monospace" font-size="14" fill="rgba(16,185,129,0.5)">github.com/naimkatiman/tradeclaw</text>

  <!-- MIT badge -->
  <g transform="translate(80, 530)">
    <rect width="60" height="20" rx="3" fill="rgba(16,185,129,0.15)"/>
    <text x="30" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981">MIT</text>
  </g>
  <g transform="translate(150, 530)">
    <rect width="90" height="20" rx="3" fill="rgba(255,255,255,0.05)"/>
    <text x="45" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)">TypeScript</text>
  </g>
  <g transform="translate(250, 530)">
    <rect width="100" height="20" rx="3" fill="rgba(255,255,255,0.05)"/>
    <text x="50" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)">Next.js 15</text>
  </g>

  <!-- Particle dots (decorative) -->
  <circle cx="400" cy="80" r="2" fill="rgba(16,185,129,0.4)"/>
  <circle cx="350" cy="180" r="1.5" fill="rgba(139,92,246,0.3)"/>
  <circle cx="550" cy="50" r="1" fill="rgba(255,255,255,0.2)"/>
  <circle cx="200" cy="560" r="2" fill="rgba(16,185,129,0.25)"/>
  <circle cx="600" cy="560" r="1.5" fill="rgba(139,92,246,0.2)"/>
  <circle cx="150" cy="480" r="1" fill="rgba(255,255,255,0.15)"/>
</svg>
