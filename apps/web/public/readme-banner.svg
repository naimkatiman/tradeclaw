<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1f17;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10b981" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <!-- Sparkline path -->
    <clipPath id="cardClip">
      <rect x="720" y="120" width="480" height="400" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Grid overlay -->
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Ambient glow top-left -->
  <ellipse cx="200" cy="200" rx="300" ry="200" fill="#10b981" opacity="0.04"/>
  <!-- Ambient glow bottom-right -->
  <ellipse cx="1100" cy="500" rx="250" ry="180" fill="#10b981" opacity="0.05"/>

  <!-- Left side: Logo + Text -->
  <!-- Claw icon -->
  <g transform="translate(80, 100)" filter="url(#glow)">
    <!-- Claw marks -->
    <path d="M 40 20 C 38 40, 30 55, 20 80" stroke="#10b981" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 55 15 C 55 38, 50 55, 45 82" stroke="#10b981" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 70 20 C 72 42, 70 58, 70 84" stroke="#10b981" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Claw base -->
    <path d="M 20 20 L 80 20 L 85 8 L 15 8 Z" fill="#10b981" rx="4"/>
  </g>

  <!-- TradeClaw wordmark -->
  <text x="80" y="230" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">Trade</text>
  <text x="80" y="230" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="800" fill="url(#emeraldGrad)" letter-spacing="-2" x="80">
    <tspan x="80" dy="0" fill="white">Trade</tspan><tspan fill="#10b981">Claw</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="285" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#9ca3af" letter-spacing="0.3">Open-source AI trading signals.</text>
  <text x="80" y="315" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#9ca3af" letter-spacing="0.3">Self-hostable. Free.</text>

  <!-- Feature pills -->
  <g transform="translate(80, 350)">
    <!-- Docker Ready pill -->
    <rect x="0" y="0" width="138" height="34" rx="17" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="69" y="22" font-family="'Segoe UI', sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">🐳 Docker Ready</text>

    <!-- MIT License pill -->
    <rect x="150" y="0" width="118" height="34" rx="17" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="209" y="22" font-family="'Segoe UI', sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">⚖️ MIT License</text>

    <!-- AI Signals pill -->
    <rect x="280" y="0" width="118" height="34" rx="17" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="339" y="22" font-family="'Segoe UI', sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">🤖 AI Signals</text>
  </g>

  <!-- GitHub star prompt -->
  <g transform="translate(80, 415)">
    <rect x="0" y="0" width="200" height="44" rx="8" fill="#10b981" filter="url(#softGlow)"/>
    <text x="100" y="28" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">⭐ Star on GitHub</text>
  </g>

  <!-- Divider line -->
  <line x1="680" y1="80" x2="680" y2="560" stroke="#1f2937" stroke-width="1"/>

  <!-- Right side: Signal Card -->
  <!-- Card background -->
  <rect x="720" y="100" width="480" height="440" rx="16" fill="#111827" stroke="#1f2937" stroke-width="1.5"/>

  <!-- Card header -->
  <rect x="720" y="100" width="480" height="60" rx="16" fill="#0f1a0f"/>
  <rect x="720" y="140" width="480" height="20" fill="#0f1a0f"/>
  <text x="760" y="138" font-family="'Segoe UI', sans-serif" font-size="14" fill="#6b7280">SIGNAL CARD · LIVE</text>
  <!-- Live indicator -->
  <circle cx="1160" cy="130" r="6" fill="#10b981" filter="url(#glow)"/>
  <circle cx="1160" cy="130" r="10" fill="#10b981" opacity="0.2"/>

  <!-- Asset + Direction -->
  <text x="760" y="210" font-family="'Segoe UI', -apple-system, sans-serif" font-size="42" font-weight="800" fill="white">XAUUSD</text>

  <!-- BUY badge -->
  <rect x="980" y="174" width="90" height="42" rx="8" fill="#10b981"/>
  <text x="1025" y="203" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="800" fill="white" text-anchor="middle">BUY</text>

  <!-- Timeframe badge -->
  <rect x="1082" y="180" width="60" height="30" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="1112" y="200" font-family="'Segoe UI', sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">H4</text>

  <!-- Confidence bar -->
  <text x="760" y="250" font-family="'Segoe UI', sans-serif" font-size="13" fill="#6b7280">CONFIDENCE</text>
  <text x="1160" y="250" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#10b981" text-anchor="end">87%</text>
  <rect x="760" y="258" width="380" height="8" rx="4" fill="#1f2937"/>
  <rect x="760" y="258" width="330" height="8" rx="4" fill="url(#emeraldGrad)" filter="url(#glow)"/>

  <!-- Separator -->
  <line x1="760" y1="285" x2="1160" y2="285" stroke="#1f2937" stroke-width="1"/>

  <!-- Signal data grid -->
  <!-- Entry -->
  <text x="760" y="315" font-family="'Segoe UI', sans-serif" font-size="12" fill="#6b7280">ENTRY ZONE</text>
  <text x="760" y="338" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="white">$2,318.40 – $2,325.00</text>

  <!-- TP/SL row -->
  <g transform="translate(760, 360)">
    <!-- TP1 -->
    <rect x="0" y="0" width="108" height="60" rx="8" fill="#0d1f0d" stroke="#10b981" stroke-width="1" opacity="0.8"/>
    <text x="54" y="22" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">TP1</text>
    <text x="54" y="45" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#10b981" text-anchor="middle">$2,342.00</text>

    <!-- TP2 -->
    <rect x="120" y="0" width="108" height="60" rx="8" fill="#0d1f0d" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <text x="174" y="22" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">TP2</text>
    <text x="174" y="45" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#10b981" text-anchor="middle">$2,358.50</text>

    <!-- TP3 -->
    <rect x="240" y="0" width="108" height="60" rx="8" fill="#0d1f0d" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <text x="294" y="22" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">TP3</text>
    <text x="294" y="45" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#10b981" text-anchor="middle">$2,377.00</text>

    <!-- SL -->
    <rect x="272" y="0" width="108" height="60" rx="8" fill="#1f0d0d" stroke="#ef4444" stroke-width="1"/>
    <text x="326" y="22" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">STOP LOSS</text>
    <text x="326" y="45" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">$2,298.00</text>
  </g>

  <!-- Indicators row -->
  <line x1="760" y1="440" x2="1160" y2="440" stroke="#1f2937" stroke-width="1"/>

  <g transform="translate(760, 460)">
    <text x="0" y="16" font-family="'Segoe UI', sans-serif" font-size="12" fill="#6b7280">RSI</text>
    <text x="0" y="36" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#f59e0b">28.4</text>

    <text x="100" y="16" font-family="'Segoe UI', sans-serif" font-size="12" fill="#6b7280">MACD</text>
    <text x="100" y="36" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#10b981">+0.42</text>

    <text x="200" y="16" font-family="'Segoe UI', sans-serif" font-size="12" fill="#6b7280">EMA 50</text>
    <text x="200" y="36" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="white">2,310</text>

    <text x="310" y="16" font-family="'Segoe UI', sans-serif" font-size="12" fill="#6b7280">ATR</text>
    <text x="310" y="36" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="white">12.4</text>
  </g>

  <!-- MTA alignment row -->
  <g transform="translate(760, 520)">
    <text x="0" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6b7280">MTA ALIGNMENT</text>
    <!-- Timeframe badges -->
    <rect x="0" y="8" width="40" height="22" rx="4" fill="#10b981" opacity="0.9"/>
    <text x="20" y="24" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">M15</text>

    <rect x="48" y="8" width="40" height="22" rx="4" fill="#10b981" opacity="0.9"/>
    <text x="68" y="24" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">H1</text>

    <rect x="96" y="8" width="40" height="22" rx="4" fill="#10b981" opacity="0.9"/>
    <text x="116" y="24" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">H4</text>

    <rect x="144" y="8" width="40" height="22" rx="4" fill="#374151" opacity="0.9"/>
    <text x="164" y="24" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#9ca3af" text-anchor="middle">D1</text>
  </g>

  <!-- Bottom tagline -->
  <text x="640" y="610" font-family="'Segoe UI', sans-serif" font-size="14" fill="#374151" text-anchor="middle">github.com/naimkatiman/tradeclaw</text>
</svg>
