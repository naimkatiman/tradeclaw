name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Welcome new issue author
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: context.payload.sender.login,
              state: 'all',
            });
            if (issues.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `👋 Welcome to **TradeClaw**, @${context.payload.sender.login}! Thanks for opening your first issue!\n\n⭐ If TradeClaw is useful to you, consider **[starring the repo](https://github.com/naimkatiman/tradeclaw)** — it helps others discover the project.\n\n📖 Check out the [docs](https://tradeclaw.win/docs) and [contributing guide](https://github.com/naimkatiman/tradeclaw/blob/main/CONTRIBUTING.md) if you'd like to help. We have plenty of [good first issues](https://github.com/naimkatiman/tradeclaw/issues?q=is%3Aopen+label%3A%22good+first+issue%22) waiting!`,
              });
            }

      - name: Welcome new PR author
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: context.payload.sender.login,
              state: 'all',
            });
            if (prs.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `🎉 Amazing, @${context.payload.sender.login} — your **first PR** to TradeClaw! Thank you for contributing!\n\n⭐ If you haven't already, please **[star the repo](https://github.com/naimkatiman/tradeclaw)** — every star helps this project grow.\n\nA maintainer will review your PR shortly. In the meantime, make sure CI passes. Questions? Ask in [Discussions](https://github.com/naimkatiman/tradeclaw/discussions).`,
              });
            }
