name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit --project apps/web/tsconfig.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tradeclaw/app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  strategy-backtests:
    # Run the deterministic backtest suite whenever anything the backtest
    # engine depends on changes. The cache key is content-addressed, so
    # unrelated PRs (UI-only, docs, workflows) get an instant cache-hit and
    # never execute the suite. When the inputs change we run it fresh and
    # publish the snapshot + log as an artifact so reviewers can diff.
    name: Strategy Backtests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Compute backtest-deps hash
        id: hash
        run: |
          HASH=$(find \
              packages/strategies/src \
              packages/signals/src \
              packages/core/src \
              packages/strategies/package.json \
              packages/signals/package.json \
              packages/core/package.json \
              -type f \
            | sort \
            | xargs sha256sum \
            | sha256sum \
            | cut -c1-16)
          echo "key=$HASH" >> "$GITHUB_OUTPUT"
      - name: Restore cached backtest result
        id: cache
        uses: actions/cache@v4
        with:
          path: .cache/backtest-result
          key: backtest-${{ steps.hash.outputs.key }}
      - name: Install
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Run strategy backtests
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/backtest-result
          npm test --workspace=@tradeclaw/strategies 2>&1 | tee .cache/backtest-result/output.log
          cp -r packages/strategies/src/__tests__/__snapshots__ .cache/backtest-result/snapshots || true
          echo "$GITHUB_SHA" > .cache/backtest-result/sha
      - name: Skip (cache hit)
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          echo "Backtest inputs unchanged (hash=${{ steps.hash.outputs.key }}); cached result reused."
          test -f .cache/backtest-result/output.log && tail -20 .cache/backtest-result/output.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-result-${{ steps.hash.outputs.key }}
          path: .cache/backtest-result
          retention-days: 14
          if-no-files-found: ignore
