<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0f1018"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#151520"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="playBtn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="playGlow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(80,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(160,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(240,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(320,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(480,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(560,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(640,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(720,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(800,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(880,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(960,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(1040,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(1120,0)"/>
    <line x1="0" y1="0" x2="0" y2="640" stroke="#fff" stroke-width="1" transform="translate(1200,0)"/>
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,80)"/>
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,160)"/>
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,240)"/>
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,320)"/>
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,400)"/>
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,480)"/>
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,560)"/>
  </g>

  <!-- Top-left: TradeClaw logo -->
  <g transform="translate(40, 30)">
    <text x="0" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#10b981">⚡</text>
    <text x="30" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">TradeClaw</text>
    <text x="165" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#6b7280">v2.0</text>
  </g>

  <!-- Top-right: Star goal badge -->
  <g transform="translate(1060, 22)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="36" rx="18" fill="#1a1a2e" stroke="#10b981" stroke-width="1" opacity="0.9"/>
    <text x="20" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fbbf24">&#9733;</text>
    <text x="38" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#e5e7eb">1,000 Star Goal</text>
  </g>

  <!-- Dashboard mock content -->
  <!-- Left panel: Signal cards -->
  <g transform="translate(40, 80)">
    <!-- BTC Signal Card -->
    <rect x="0" y="0" width="260" height="100" rx="12" fill="url(#cardBg)" stroke="#1e1e30" stroke-width="1"/>
    <text x="16" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6b7280">BTCUSD</text>
    <text x="16" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">$67,842</text>
    <rect x="16" y="64" width="50" height="22" rx="6" fill="#10b981" opacity="0.15"/>
    <text x="24" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#10b981">BUY</text>
    <text x="80" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">RSI 42 | MACD &#9650;</text>
    <!-- Confidence bar -->
    <rect x="170" y="16" width="72" height="6" rx="3" fill="#1e1e30"/>
    <rect x="170" y="16" width="58" height="6" rx="3" fill="url(#greenGrad)"/>
    <text x="170" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">81% conf</text>

    <!-- ETH Signal Card -->
    <rect x="0" y="112" width="260" height="100" rx="12" fill="url(#cardBg)" stroke="#1e1e30" stroke-width="1"/>
    <text x="16" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6b7280">ETHUSD</text>
    <text x="16" y="164" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">$3,456</text>
    <rect x="16" y="176" width="50" height="22" rx="6" fill="#ef4444" opacity="0.15"/>
    <text x="22" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ef4444">SELL</text>
    <text x="80" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">RSI 72 | MACD &#9660;</text>
    <rect x="170" y="128" width="72" height="6" rx="3" fill="#1e1e30"/>
    <rect x="170" y="128" width="48" height="6" rx="3" fill="url(#redGrad)"/>
    <text x="170" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444">67% conf</text>

    <!-- XAU Signal Card -->
    <rect x="0" y="224" width="260" height="100" rx="12" fill="url(#cardBg)" stroke="#1e1e30" stroke-width="1"/>
    <text x="16" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6b7280">XAUUSD</text>
    <text x="16" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">$2,178</text>
    <rect x="16" y="288" width="50" height="22" rx="6" fill="#10b981" opacity="0.15"/>
    <text x="24" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#10b981">BUY</text>
    <text x="80" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">RSI 38 | MACD &#9650;</text>
    <rect x="170" y="240" width="72" height="6" rx="3" fill="#1e1e30"/>
    <rect x="170" y="240" width="65" height="6" rx="3" fill="url(#greenGrad)"/>
    <text x="170" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">90% conf</text>
  </g>

  <!-- Center: Chart area -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="580" height="324" rx="12" fill="url(#cardBg)" stroke="#1e1e30" stroke-width="1"/>
    <text x="16" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#e5e7eb">BTCUSD — H4</text>
    <text x="480" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#10b981">+2.4%</text>

    <!-- Candlestick-style chart lines -->
    <g transform="translate(20, 50)" opacity="0.6">
      <!-- Price line (simplified) -->
      <polyline points="0,180 30,170 60,150 90,160 120,130 150,120 180,140 210,100 240,90 270,110 300,80 330,70 360,60 390,75 420,50 450,40 480,55 510,30 540,20"
        fill="none" stroke="#10b981" stroke-width="2"/>
      <!-- Area fill -->
      <polyline points="0,180 30,170 60,150 90,160 120,130 150,120 180,140 210,100 240,90 270,110 300,80 330,70 360,60 390,75 420,50 450,40 480,55 510,30 540,20 540,240 0,240"
        fill="#10b981" opacity="0.06"/>
      <!-- Volume bars -->
      <rect x="0" y="210" width="14" height="30" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="30" y="220" width="14" height="20" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="60" y="200" width="14" height="40" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="90" y="215" width="14" height="25" rx="2" fill="#ef4444" opacity="0.3"/>
      <rect x="120" y="195" width="14" height="45" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="150" y="210" width="14" height="30" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="180" y="220" width="14" height="20" rx="2" fill="#ef4444" opacity="0.3"/>
      <rect x="210" y="190" width="14" height="50" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="240" y="200" width="14" height="40" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="270" y="215" width="14" height="25" rx="2" fill="#ef4444" opacity="0.3"/>
      <rect x="300" y="195" width="14" height="45" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="330" y="205" width="14" height="35" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="360" y="210" width="14" height="30" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="390" y="220" width="14" height="20" rx="2" fill="#ef4444" opacity="0.3"/>
      <rect x="420" y="190" width="14" height="50" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="450" y="200" width="14" height="40" rx="2" fill="#10b981" opacity="0.3"/>
      <rect x="480" y="215" width="14" height="25" rx="2" fill="#ef4444" opacity="0.3"/>
      <rect x="510" y="185" width="14" height="55" rx="2" fill="#10b981" opacity="0.3"/>
    </g>

    <!-- RSI indicator line -->
    <g transform="translate(20, 50)" opacity="0.4">
      <polyline points="0,140 60,155 120,130 180,145 240,120 300,135 360,110 420,100 480,115 540,95"
        fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,4"/>
    </g>
  </g>

  <!-- Right panel: Stats -->
  <g transform="translate(920, 80)">
    <!-- Portfolio stat -->
    <rect x="0" y="0" width="320" height="72" rx="12" fill="url(#cardBg)" stroke="#1e1e30" stroke-width="1"/>
    <text x="16" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6b7280" text-transform="uppercase" letter-spacing="1">PORTFOLIO VALUE</text>
    <text x="16" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#ffffff">$12,847</text>
    <text x="160" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#10b981">+28.5%</text>

    <!-- Win rate -->
    <rect x="0" y="84" width="155" height="72" rx="12" fill="url(#cardBg)" stroke="#1e1e30" stroke-width="1"/>
    <text x="16" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6b7280">WIN RATE</text>
    <text x="16" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#10b981">73%</text>

    <!-- Total trades -->
    <rect x="165" y="84" width="155" height="72" rx="12" fill="url(#cardBg)" stroke="#1e1e30" stroke-width="1"/>
    <text x="181" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6b7280">TRADES</text>
    <text x="181" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">142</text>

    <!-- Active signals -->
    <rect x="0" y="168" width="320" height="72" rx="12" fill="url(#cardBg)" stroke="#1e1e30" stroke-width="1"/>
    <text x="16" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6b7280">ACTIVE SIGNALS</text>
    <text x="16" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">8</text>
    <text x="40" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7280">across 12 pairs</text>

    <!-- Indicators row -->
    <rect x="0" y="252" width="320" height="72" rx="12" fill="url(#cardBg)" stroke="#1e1e30" stroke-width="1"/>
    <text x="16" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6b7280">INDICATORS</text>
    <g transform="translate(16, 288)">
      <rect x="0" y="0" width="40" height="20" rx="4" fill="#10b981" opacity="0.15"/>
      <text x="8" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#10b981">RSI</text>
      <rect x="48" y="0" width="52" height="20" rx="4" fill="#8b5cf6" opacity="0.15"/>
      <text x="54" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#8b5cf6">MACD</text>
      <rect x="108" y="0" width="42" height="20" rx="4" fill="#3b82f6" opacity="0.15"/>
      <text x="116" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#3b82f6">EMA</text>
      <rect x="158" y="0" width="36" height="20" rx="4" fill="#f59e0b" opacity="0.15"/>
      <text x="164" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#f59e0b">BB</text>
      <rect x="202" y="0" width="52" height="20" rx="4" fill="#ec4899" opacity="0.15"/>
      <text x="210" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#ec4899">STOCH</text>
    </g>
  </g>

  <!-- Semi-transparent overlay for play button area -->
  <rect x="0" y="0" width="1280" height="640" fill="#0a0a0f" opacity="0.35"/>

  <!-- Central play button -->
  <g transform="translate(640, 280)" filter="url(#playGlow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#10b981" stroke-width="2" opacity="0.3"/>
    <!-- Button background -->
    <circle cx="0" cy="0" r="48" fill="url(#playBtn)" opacity="0.95"/>
    <!-- Play triangle -->
    <polygon points="-12,-18 -12,18 18,0" fill="#ffffff"/>
  </g>

  <!-- "Watch 2-min demo" text -->
  <text x="640" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#e5e7eb" text-anchor="middle" letter-spacing="0.5">Watch 2-min Demo</text>
  <text x="640" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">See TradeClaw in action — signals, backtest, paper trading</text>

  <!-- Bottom bar -->
  <g transform="translate(0, 580)">
    <rect x="0" y="0" width="1280" height="60" fill="#0a0a0f" opacity="0.8"/>
    <text x="40" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">github.com/naimkatiman/tradeclaw</text>
    <text x="1240" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280" text-anchor="end">MIT License</text>
    <text x="640" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#10b981" text-anchor="middle">Free &amp; Open Source</text>
  </g>
</svg>