<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <style>
    @keyframes cardSlide1 { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes cardSlide2 { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes cardSlide3 { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes barGrow87 { from{width:0} to{width:174px} }
    @keyframes barGrow72 { from{width:0} to{width:144px} }
    @keyframes barGrow65 { from{width:0} to{width:130px} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes numCount { from{opacity:0} to{opacity:1} }

    .card1 { opacity:0; animation: cardSlide1 0.6s ease forwards; animation-delay: 0.5s; }
    .card2 { opacity:0; animation: cardSlide2 0.6s ease forwards; animation-delay: 1.0s; }
    .card3 { opacity:0; animation: cardSlide3 0.6s ease forwards; animation-delay: 1.5s; }

    .bar1 { animation: barGrow87 1s ease forwards; animation-delay: 1.1s; }
    .bar2 { animation: barGrow72 1s ease forwards; animation-delay: 1.6s; }
    .bar3 { animation: barGrow65 1s ease forwards; animation-delay: 2.1s; }

    .header { opacity:0; animation: fadeIn 0.5s ease forwards; animation-delay: 0.2s; }
    .stats { opacity:0; animation: fadeIn 0.5s ease forwards; animation-delay: 2.8s; }
    .live-dot { animation: pulse 2s ease infinite; }

    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <defs>
    <linearGradient id="dashBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c10"/>
      <stop offset="100%" stop-color="#040608"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f85149"/>
      <stop offset="100%" stop-color="#ff7b72"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip1"><rect x="0" y="0" width="200" height="8" rx="4"/></clipPath>
    <clipPath id="clip2"><rect x="0" y="0" width="200" height="8" rx="4"/></clipPath>
    <clipPath id="clip3"><rect x="0" y="0" width="200" height="8" rx="4"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="url(#dashBg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2128" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="500" fill="url(#grid)" opacity="0.4" rx="12"/>

  <!-- Header -->
  <g class="header">
    <!-- Logo mark -->
    <rect x="32" y="24" width="32" height="32" rx="8" fill="#10b981" opacity="0.15"/>
    <text x="40" y="47" fill="#10b981" font-size="18" font-weight="bold">TC</text>

    <text x="76" y="44" fill="#e6edf3" font-size="18" font-weight="700" letter-spacing="0.5">TradeClaw</text>
    <text x="200" y="44" fill="#484f58" font-size="14">Dashboard</text>

    <!-- Live indicator -->
    <circle cx="820" cy="40" r="5" fill="#10b981" class="live-dot" filter="url(#glow)"/>
    <text x="833" y="44" fill="#3fb950" font-size="12" font-weight="600">LIVE</text>

    <!-- Divider -->
    <line x1="32" y1="68" x2="868" y2="68" stroke="#21262d" stroke-width="1"/>
  </g>

  <!-- Card 1: BTCUSD BUY 87% -->
  <g class="card1">
    <rect x="32" y="88" width="268" height="180" rx="12" fill="url(#cardBg)" stroke="#21262d" stroke-width="1"/>

    <!-- Card header -->
    <text x="52" y="120" fill="#e6edf3" font-size="18" font-weight="700">BTCUSD</text>
    <rect x="148" y="105" width="52" height="22" rx="6" fill="#10b981" opacity="0.15"/>
    <text x="160" y="121" fill="#3fb950" font-size="12" font-weight="700">BUY</text>

    <!-- Arrow up -->
    <polygon points="230,106 240,118 236,118 236,126 224,126 224,118 220,118" fill="#3fb950" opacity="0.8"/>

    <!-- Price -->
    <text x="52" y="150" fill="#8b949e" font-size="12">Entry</text>
    <text x="52" y="170" fill="#e6edf3" font-size="22" font-weight="600">$87,245</text>

    <!-- Confidence bar -->
    <text x="52" y="200" fill="#8b949e" font-size="11">Confidence</text>
    <text x="228" y="200" fill="#3fb950" font-size="13" font-weight="700" text-anchor="end">87%</text>
    <rect x="52" y="208" width="200" height="8" rx="4" fill="#21262d"/>
    <g clip-path="url(#clip1)" transform="translate(52,208)">
      <rect class="bar1" x="0" y="0" height="8" rx="4" fill="url(#greenGrad)"/>
    </g>

    <!-- TP/SL -->
    <text x="52" y="244" fill="#3fb950" font-size="11">TP1 $89,120</text>
    <text x="145" y="244" fill="#3fb950" font-size="11">TP2 $91,500</text>
    <text x="230" y="244" fill="#f85149" font-size="11" text-anchor="end">SL $85,800</text>
  </g>

  <!-- Card 2: XAUUSD SELL 72% -->
  <g class="card2">
    <rect x="316" y="88" width="268" height="180" rx="12" fill="url(#cardBg)" stroke="#21262d" stroke-width="1"/>

    <text x="336" y="120" fill="#e6edf3" font-size="18" font-weight="700">XAUUSD</text>
    <rect x="436" y="105" width="56" height="22" rx="6" fill="#f85149" opacity="0.15"/>
    <text x="448" y="121" fill="#f85149" font-size="12" font-weight="700">SELL</text>

    <!-- Arrow down -->
    <polygon points="518,126 528,114 524,114 524,106 512,106 512,114 508,114" fill="#f85149" opacity="0.8"/>

    <text x="336" y="150" fill="#8b949e" font-size="12">Entry</text>
    <text x="336" y="170" fill="#e6edf3" font-size="22" font-weight="600">$3,048</text>

    <text x="336" y="200" fill="#8b949e" font-size="11">Confidence</text>
    <text x="512" y="200" fill="#f85149" font-size="13" font-weight="700" text-anchor="end">72%</text>
    <rect x="336" y="208" width="200" height="8" rx="4" fill="#21262d"/>
    <g clip-path="url(#clip2)" transform="translate(336,208)">
      <rect class="bar2" x="0" y="0" height="8" rx="4" fill="url(#redGrad)"/>
    </g>

    <text x="336" y="244" fill="#3fb950" font-size="11">TP1 $3,025</text>
    <text x="425" y="244" fill="#3fb950" font-size="11">TP2 $2,998</text>
    <text x="512" y="244" fill="#f85149" font-size="11" text-anchor="end">SL $3,072</text>
  </g>

  <!-- Card 3: EURUSD BUY 65% -->
  <g class="card3">
    <rect x="600" y="88" width="268" height="180" rx="12" fill="url(#cardBg)" stroke="#21262d" stroke-width="1"/>

    <text x="620" y="120" fill="#e6edf3" font-size="18" font-weight="700">EURUSD</text>
    <rect x="720" y="105" width="52" height="22" rx="6" fill="#10b981" opacity="0.15"/>
    <text x="732" y="121" fill="#3fb950" font-size="12" font-weight="700">BUY</text>

    <polygon points="802,106 812,118 808,118 808,126 796,126 796,118 792,118" fill="#3fb950" opacity="0.8"/>

    <text x="620" y="150" fill="#8b949e" font-size="12">Entry</text>
    <text x="620" y="170" fill="#e6edf3" font-size="22" font-weight="600">1.0842</text>

    <text x="620" y="200" fill="#8b949e" font-size="11">Confidence</text>
    <text x="796" y="200" fill="#3fb950" font-size="13" font-weight="700" text-anchor="end">65%</text>
    <rect x="620" y="208" width="200" height="8" rx="4" fill="#21262d"/>
    <g clip-path="url(#clip3)" transform="translate(620,208)">
      <rect class="bar3" x="0" y="0" height="8" rx="4" fill="url(#greenGrad)"/>
    </g>

    <text x="620" y="244" fill="#3fb950" font-size="11">TP1 1.0890</text>
    <text x="710" y="244" fill="#3fb950" font-size="11">TP2 1.0935</text>
    <text x="796" y="244" fill="#f85149" font-size="11" text-anchor="end">SL 1.0795</text>
  </g>

  <!-- Stats bar at bottom -->
  <g class="stats">
    <line x1="32" y1="300" x2="868" y2="300" stroke="#21262d" stroke-width="1"/>

    <!-- Stats row -->
    <rect x="32" y="316" width="200" height="72" rx="10" fill="url(#cardBg)" stroke="#21262d" stroke-width="1"/>
    <text x="52" y="340" fill="#8b949e" font-size="11">Active Signals</text>
    <text x="52" y="368" fill="#e6edf3" font-size="26" font-weight="700">15</text>
    <text x="90" y="368" fill="#3fb950" font-size="12">pairs</text>

    <rect x="248" y="316" width="200" height="72" rx="10" fill="url(#cardBg)" stroke="#21262d" stroke-width="1"/>
    <text x="268" y="340" fill="#8b949e" font-size="11">Avg Confidence</text>
    <text x="268" y="368" fill="#10b981" font-size="26" font-weight="700">74.6%</text>

    <rect x="464" y="316" width="200" height="72" rx="10" fill="url(#cardBg)" stroke="#21262d" stroke-width="1"/>
    <text x="484" y="340" fill="#8b949e" font-size="11">Win Rate (30d)</text>
    <text x="484" y="368" fill="#3fb950" font-size="26" font-weight="700">68.2%</text>

    <rect x="680" y="316" width="188" height="72" rx="10" fill="url(#cardBg)" stroke="#21262d" stroke-width="1"/>
    <text x="700" y="340" fill="#8b949e" font-size="11">Total Signals (30d)</text>
    <text x="700" y="368" fill="#e6edf3" font-size="26" font-weight="700">847</text>

    <!-- Mini chart sparkline area -->
    <rect x="32" y="404" width="836" height="80" rx="10" fill="url(#cardBg)" stroke="#21262d" stroke-width="1"/>
    <text x="52" y="428" fill="#8b949e" font-size="11">Signal Performance (7d)</text>
    <text x="828" y="428" fill="#3fb950" font-size="11" text-anchor="end">+12.4%</text>

    <!-- Sparkline -->
    <polyline points="52,465 100,460 148,470 196,455 244,450 292,458 340,445 388,440 436,448 484,435 532,438 580,430 628,425 676,432 724,420 772,415 820,410"
      fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Sparkline fill -->
    <polygon points="52,465 100,460 148,470 196,455 244,450 292,458 340,445 388,440 436,448 484,435 532,438 580,430 628,425 676,432 724,420 772,415 820,410 820,475 52,475"
      fill="#10b981" opacity="0.08"/>
  </g>
</svg>