<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540">
  <style>
    @keyframes cardFadeIn1 {
      0%,2% { opacity: 0; transform: translateY(20px); }
      6%,88% { opacity: 1; transform: translateY(0); }
      94%,100% { opacity: 0; transform: translateY(20px); }
    }
    @keyframes cardFadeIn2 {
      0%,6% { opacity: 0; transform: translateY(20px); }
      10%,88% { opacity: 1; transform: translateY(0); }
      94%,100% { opacity: 0; transform: translateY(20px); }
    }
    @keyframes cardFadeIn3 {
      0%,10% { opacity: 0; transform: translateY(20px); }
      14%,88% { opacity: 1; transform: translateY(0); }
      94%,100% { opacity: 0; transform: translateY(20px); }
    }
    @keyframes confBar87 {
      0%,8% { width: 0; }
      16%,86% { width: 148px; }
      94%,100% { width: 0; }
    }
    @keyframes confBar72 {
      0%,12% { width: 0; }
      20%,86% { width: 122px; }
      94%,100% { width: 0; }
    }
    @keyframes confBar91 {
      0%,16% { width: 0; }
      24%,86% { width: 155px; }
      94%,100% { width: 0; }
    }
    @keyframes scrollTicker {
      0% { transform: translateX(900px); }
      100% { transform: translateX(-1600px); }
    }
    @keyframes pulseGlow {
      0%,100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes fadeInGeneral {
      0%,1% { opacity: 0; }
      5%,90% { opacity: 1; }
      96%,100% { opacity: 0; }
    }
    @keyframes countUp1 {
      0%,10% { opacity: 0; }
      15%,88% { opacity: 1; }
      94%,100% { opacity: 0; }
    }
    @keyframes miniChart {
      0% { d: path("M0,30 Q15,28 30,25 T60,20 T90,15 T120,18 T150,10"); }
      50% { d: path("M0,30 Q15,22 30,28 T60,15 T90,22 T120,12 T150,8"); }
      100% { d: path("M0,30 Q15,28 30,25 T60,20 T90,15 T120,18 T150,10"); }
    }
    @keyframes chartPulse {
      0%,100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }

    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif; }

    .card1 { opacity: 0; animation: cardFadeIn1 16s ease infinite; }
    .card2 { opacity: 0; animation: cardFadeIn2 16s ease infinite; }
    .card3 { opacity: 0; animation: cardFadeIn3 16s ease infinite; }

    .bar1 { animation: confBar87 16s ease infinite; }
    .bar2 { animation: confBar72 16s ease infinite; }
    .bar3 { animation: confBar91 16s ease infinite; }

    .header { opacity: 0; animation: fadeInGeneral 16s ease infinite; }
    .stats { opacity: 0; animation: countUp1 16s ease infinite; }
    .sidebar { opacity: 0; animation: fadeInGeneral 16s ease infinite; animation-delay: 0.3s; }

    .live-dot { animation: pulseGlow 2s ease infinite; }
    .ticker-group { animation: scrollTicker 20s linear infinite; }
    .chart-line { animation: chartPulse 3s ease infinite; }
  </style>

  <defs>
    <linearGradient id="dashBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c10"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <clipPath id="tickerClip">
      <rect x="0" y="0" width="900" height="36"/>
    </clipPath>
    <clipPath id="dashClip">
      <rect x="0" y="0" width="900" height="540" rx="12"/>
    </clipPath>
  </defs>

  <!-- Main background -->
  <rect width="900" height="540" rx="12" fill="url(#dashBg)" stroke="#21262d" stroke-width="1"/>

  <g clip-path="url(#dashClip)">

  <!-- Top ticker bar -->
  <rect width="900" height="36" fill="#0b0f14" opacity="0.9"/>
  <g clip-path="url(#tickerClip)">
    <g class="ticker-group">
      <text y="23" fill="#3fb950" font-size="12" font-weight="500">
        <tspan x="0">BTCUSD $67,842 +2.4%</tspan>
        <tspan x="200" fill="#f85149">EURUSD 1.0842 -0.3%</tspan>
        <tspan x="400" fill="#3fb950">XAUUSD $2,342 +1.1%</tspan>
        <tspan x="600" fill="#f85149">GBPUSD 1.2634 -0.5%</tspan>
        <tspan x="800" fill="#3fb950">ETHUSD $3,456 +3.2%</tspan>
        <tspan x="1000" fill="#3fb950">SOLUSD $142.8 +5.1%</tspan>
        <tspan x="1200" fill="#f85149">USDJPY 151.24 -0.2%</tspan>
        <tspan x="1400" fill="#3fb950">XRPUSD $0.624 +1.8%</tspan>
      </text>
    </g>
  </g>

  <!-- Header bar -->
  <g class="header">
    <rect x="0" y="36" width="900" height="52" fill="#0d1117"/>
    <rect x="0" y="87" width="900" height="1" fill="#21262d"/>

    <!-- Logo -->
    <text x="24" y="68" fill="#e6edf3" font-size="18" font-weight="700">TradeClaw</text>
    <text x="132" y="68" fill="#10b981" font-size="11" font-weight="600">PRO</text>

    <!-- Nav items -->
    <text x="200" y="67" fill="#8b949e" font-size="13">Dashboard</text>
    <text x="290" y="67" fill="#8b949e" font-size="13">Signals</text>
    <text x="365" y="67" fill="#8b949e" font-size="13">Backtest</text>
