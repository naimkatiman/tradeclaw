<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#1a2332" stroke-width="1.5"/>
  <!-- Claw mark — 3 diagonal slashes -->
  <g filter="url(#glow)" stroke="url(#claw)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left claw -->
    <path d="M 32 38 Q 28 55 38 78" stroke-width="5.5"/>
    <!-- Center claw -->
    <path d="M 48 30 Q 44 52 54 82" stroke-width="5.5"/>
    <!-- Right claw -->
    <path d="M 64 28 Q 62 52 72 80" stroke-width="5.5"/>
    <!-- Horizontal swipe connecting top -->
    <path d="M 28 42 Q 48 34 70 30" stroke-width="3" opacity="0.6"/>
  </g>
  <!-- Chart line underneath -->
  <polyline points="32,88 44,80 56,84 68,72 80,76 92,62" stroke="url(#claw)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Small dot at end -->
  <circle cx="92" cy="62" r="3" fill="#22d3ee" opacity="0.9"/>
</svg>
