name: Auto-fix lockfile

on:
  push:
    branches: [main]
    paths:
      - '**/package.json'
      - '!**/node_modules/**'

jobs:
  sync-lockfile:
    name: Sync package-lock.json
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Run npm install to sync lockfile
        run: npm install --package-lock-only

      - name: Commit lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --staged --quiet || git commit -m "chore: sync package-lock.json [skip ci]"
          git push
