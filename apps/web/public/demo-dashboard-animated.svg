<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <style>
      @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
      @keyframes slideDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
      @keyframes countUp { from { opacity:0; } to { opacity:1; } }
      @keyframes pulse2 { 0%,100%{opacity:1;} 50%{opacity:0.25;} }
      @keyframes chartDraw { from { stroke-dashoffset: 600; } to { stroke-dashoffset: 0; } }
      .hdr { animation: slideDown 0.5s ease 0.1s both; }
      .stat1 { animation: fadeIn 0.4s ease 0.3s both; }
      .stat2 { animation: fadeIn 0.4s ease 0.5s both; }
      .stat3 { animation: fadeIn 0.4s ease 0.7s both; }
      .stat4 { animation: fadeIn 0.4s ease 0.9s both; }
      .chart { animation: fadeIn 0.6s ease 0.8s both; }
      .sigs { animation: fadeIn 0.5s ease 1.2s both; }
      .dot { animation: pulse2 1.5s ease infinite; }
      .line1 { stroke-dasharray:600; animation: chartDraw 2s ease 0.9s both; }
    </style>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070b0f"/>
      <stop offset="100%" stop-color="#030507"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="purpleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="900" height="500" fill="url(#bg2)" rx="16"/>
  <rect width="900" height="500" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" rx="16"/>
  <ellipse cx="450" cy="100" rx="400" ry="100" fill="rgba(16,185,129,0.03)"/>

  <!-- Header -->
  <g class="hdr">
    <!-- Left logo -->
    <rect x="24" y="18" width="28" height="28" rx="8" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="30" y="36" font-family="monospace" font-size="14" font-weight="bold" fill="#10b981">TC</text>
    <text x="60" y="36" font-family="monospace" font-size="14" font-weight="bold" fill="white">TradeClaw</text>
    <text x="170" y="36" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.25)">Dashboard</text>

    <!-- Live indicator -->
    <circle cx="760" cy="30" r="4" fill="#10b981" class="dot"/>
    <circle cx="760" cy="30" r="8" fill="rgba(16,185,129,0.2)" class="dot"/>
    <text x="774" y="35" font-family="monospace" font-size="11" fill="#10b981">LIVE</text>

    <!-- Nav pills -->
    <rect x="340" y="16" width="68" height="28" rx="14" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
    <text x="360" y="34" font-family="monospace" font-size="11" fill="#10b981">Signals</text>
    <text x="430" y="34" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.3)">Backtest</text>
    <text x="510" y="34" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.3)">Screener</text>
    <text x="590" y="34" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.3)">Portfolio</text>
  </g>

  <rect x="24" y="56" width="852" height="1" fill="rgba(255,255,255,0.04)"/>

  <!-- Stat cards -->
  <g class="stat1">
    <rect x="24" y="72" width="190" height="80" rx="12" fill="rgba(16,185,129,0.06)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
    <text x="44" y="100" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">SIGNALS TODAY</text>
    <text x="44" y="128" font-family="monospace" font-size="28" font-weight="bold" fill="white">
      <tspan>0</tspan>
      <animate attributeName="textContent" values="0;12;28;47;63;78;94;112;128;142;147" dur="1.5s" begin="0.5s" fill="freeze"/>
    </text>
    <text x="44" y="128" font-family="monospace" font-size="28" font-weight="bold" fill="white">147</text>
    <text x="160" y="128" font-family="monospace" font-size="11" fill="rgba(16,185,129,0.8)">↑ +12%</text>
  </g>
  <g class="stat2">
    <rect x="228" y="72" width="190" height="80" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="248" y="100" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">WIN RATE</text>
    <text x="248" y="128" font-family="monospace" font-size="28" font-weight="bold" fill="white">68.4%</text>
    <text x="350" y="128" font-family="monospace" font-size="11" fill="rgba(16,185,129,0.8)">30d</text>
  </g>
  <g class="stat3">
    <rect x="432" y="72" width="190" height="80" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="452" y="100" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">AVG CONFIDENCE</text>
    <text x="452" y="128" font-family="monospace" font-size="28" font-weight="bold" fill="#f59e0b">79%</text>
  </g>
  <g class="stat4">
    <rect x="636" y="72" width="240" height="80" rx="12" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
    <text x="656" y="100" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">ASSETS COVERED</text>
    <text x="656" y="128" font-family="monospace" font-size="28" font-weight="bold" fill="white">10</text>
    <text x="706" y="128" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.3)">pairs</text>
    <text x="760" y="115" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">BTC ETH XAU XAG</text>
    <text x="760" y="130" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">EUR GBP JPY AUD</text>
  </g>

  <!-- Chart area -->
  <g class="chart">
    <rect x="24" y="168" width="570" height="220" rx="12" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="44" y="194" font-family="monospace" font-size="11" font-weight="bold" fill="rgba(255,255,255,0.7)">BTCUSD · H1</text>
    <text x="44" y="208" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.25)">Price + EMA20/50 overlay</text>

    <!-- Y axis labels -->
    <text x="32" y="230" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.2)">86k</text>
    <text x="32" y="270" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.2)">85k</text>
    <text x="32" y="310" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.2)">84k</text>
    <text x="32" y="350" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.2)">83k</text>

    <!-- Grid lines -->
    <line x1="55" y1="226" x2="580" y2="226" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="55" y1="266" x2="580" y2="266" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="55" y1="306" x2="580" y2="306" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="55" y1="346" x2="580" y2="346" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

    <!-- Candlestick area fill -->
    <path d="M55 320 L100 310 L145 295 L190 305 L235 280 L280 265 L325 258 L370 242 L415 250 L460 235 L505 228 L550 222 L580 222 L580 360 L55 360 Z" fill="url(#chartFill)"/>

    <!-- EMA50 line (purple) -->
    <path d="M55 332 L100 325 L145 315 L190 320 L235 305 L280 294 L325 286 L370 274 L415 278 L460 268 L505 260 L550 254 L580 250" fill="none" stroke="rgba(139,92,246,0.5)" stroke-width="1.5" stroke-dasharray="600" class="line1"/>

    <!-- Price line (emerald) -->
    <path d="M55 320 L100 310 L145 295 L190 305 L235 280 L280 265 L325 258 L370 242 L415 250 L460 235 L505 228 L550 222 L580 218" fill="none" stroke="#10b981" stroke-width="2" class="line1" style="animation-delay:0.85s"/>

    <!-- BUY signal marker -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
      <polygon points="280,278 272,294 288,294" fill="#10b981"/>
      <rect x="240" y="250" width="76" height="22" rx="6" fill="rgba(16,185,129,0.9)"/>
      <text x="256" y="265" font-family="monospace" font-size="10" font-weight="bold" fill="white">▲ BUY 87%</text>
    </g>

    <!-- Price tip dot -->
    <circle cx="580" cy="218" r="4" fill="#10b981" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
    </circle>
    <circle cx="580" cy="218" r="8" fill="rgba(16,185,129,0.2)" class="dot" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
    </circle>
    <text x="510" y="215" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.5)" opacity="0">
      $84,250
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
    </text>
  </g>

  <!-- Signal list (right panel) -->
  <g class="sigs">
    <rect x="608" y="168" width="268" height="220" rx="12" fill="rgba(255,255,255,0.01)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="628" y="194" font-family="monospace" font-size="11" font-weight="bold" fill="rgba(255,255,255,0.7)">Latest Signals</text>

    <!-- Signal row 1 -->
    <rect x="620" y="202" width="244" height="36" rx="8" fill="rgba(16,185,129,0.06)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
    <text x="634" y="224" font-family="monospace" font-size="11" font-weight="bold" fill="white">BTCUSD</text>
    <rect x="700" y="208" width="38" height="18" rx="9" fill="rgba(16,185,129,0.2)"/>
    <text x="709" y="221" font-family="monospace" font-size="9" font-weight="bold" fill="#10b981">▲BUY</text>
    <text x="750" y="221" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">H1 87%</text>
    <text x="820" y="221" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.25)">2m</text>

    <!-- Signal row 2 -->
    <rect x="620" y="244" width="244" height="36" rx="8" fill="rgba(244,63,94,0.04)" stroke="rgba(244,63,94,0.12)" stroke-width="1"/>
    <text x="634" y="266" font-family="monospace" font-size="11" font-weight="bold" fill="white">XAUUSD</text>
    <rect x="706" y="250" width="42" height="18" rx="9" fill="rgba(244,63,94,0.2)"/>
    <text x="713" y="263" font-family="monospace" font-size="9" font-weight="bold" fill="#f43f5e">▼SELL</text>
    <text x="756" y="263" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">H4 74%</text>
    <text x="820" y="263" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.25)">5m</text>

    <!-- Signal row 3 -->
    <rect x="620" y="286" width="244" height="36" rx="8" fill="rgba(16,185,129,0.06)" stroke="rgba(16,185,129,0.15)" stroke-width="1"/>
    <text x="634" y="308" font-family="monospace" font-size="11" font-weight="bold" fill="white">ETHUSD</text>
    <rect x="706" y="292" width="38" height="18" rx="9" fill="rgba(16,185,129,0.2)"/>
    <text x="715" y="305" font-family="monospace" font-size="9" font-weight="bold" fill="#10b981">▲BUY</text>
    <text x="752" y="305" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">D1 91%</text>
    <text x="820" y="305" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.25)">8m</text>

    <!-- Signal row 4 -->
    <rect x="620" y="328" width="244" height="36" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="634" y="350" font-family="monospace" font-size="11" font-weight="bold" fill="white">EURUSD</text>
    <rect x="706" y="334" width="42" height="18" rx="9" fill="rgba(244,63,94,0.2)"/>
    <text x="713" y="347" font-family="monospace" font-size="9" font-weight="bold" fill="#f43f5e">▼SELL</text>
    <text x="756" y="347" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.3)">H1 68%</text>
    <text x="820" y="347" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.25)">11m</text>
  </g>

  <!-- Footer -->
  <rect x="24" y="402" width="852" height="1" fill="rgba(255,255,255,0.04)"/>
  <text x="24" y="424" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.2)">⭐ github.com/naimkatiman/tradeclaw</text>
  <text x="380" y="424" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.15)">Free · Open Source · Self-Hostable</text>
  <text x="700" y="424" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.2)">tradeclaw.win</text>

  <!-- Corner star CTA -->
  <rect x="660" y="444" width="220" height="36" rx="18" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.35)" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.5s" fill="freeze"/>
  </rect>
  <text x="682" y="467" font-family="monospace" font-size="12" font-weight="bold" fill="#10b981" opacity="0">
    ⭐ Star on GitHub
    <animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.5s" fill="freeze"/>
  </text>
</svg>
