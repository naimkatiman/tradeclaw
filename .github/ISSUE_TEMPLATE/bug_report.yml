name: 🐛 Bug Report
description: Something broken? Let us know.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X, Y breaks instead of doing Z...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to /dashboard
        2. Click "Signals"
        3. Filter by XAUUSD
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: deploy
    attributes:
      label: How are you running TradeClaw?
      options:
        - Docker Compose
        - npm run dev (local)
        - Railway
        - Vercel
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. main@83b379e or v1.2.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste console errors, docker logs, or screenshots here.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before filing this
          required: true
        - label: I'm on the latest version
          required: false
