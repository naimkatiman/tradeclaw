name: Docker Smoke Test

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'apps/web/**'
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  docker-test:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Start containers
        run: |
          docker compose up -d --build
        env:
          DOCKER_BUILDKIT: 1

      - name: Wait for health endpoint
        run: |
          echo "Waiting for TradeClaw to start..."
          timeout 90 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 2; done'
          echo ""
          echo "✅ Service is up!"

      - name: Run smoke tests
        run: |
          CLEANUP=false TRADECLAW_URL=http://localhost:3000 bash scripts/test-docker.sh

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Teardown
        if: always()
        run: docker compose down --volumes --remove-orphans
