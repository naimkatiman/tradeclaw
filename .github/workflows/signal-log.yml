name: Signal Log

# Triggers /api/cron/signals on Railway, which records new signals, resolves
# 4h/24h outcomes, and writes one row into signal_run_log with a SHA-256 over
# the signal_history snapshot at run-start.
#
# Audit trail lives in the signal_run_log table — query it for tamper-evident
# proof that signals existed before outcomes were known. The previous version
# of this workflow committed data/signal-log.json on every run; that path was
# retired 2026-05-05 because it polluted main branch history and slowed CI.
# See migration 026_signal_run_log.sql for the table shape and
# apps/web/lib/signal-run-log.ts for the recorder.
#
# This workflow no longer writes to the repo — `permissions: contents: read`
# is enforced. The Vercel/Railway 5-min internal cron already covers normal
# operation; this scheduled job is a backup trigger every 6 hours.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron endpoint to record signals and resolve outcomes
        run: |
          set -euo pipefail
          response=$(curl -s -w "\n%{http_code}" -X POST \
            https://tradeclaw.win/api/cron/signals \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 60)
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" -ne 200 ]; then
            echo "::warning::Cron endpoint returned $status"
            exit 1
          fi
