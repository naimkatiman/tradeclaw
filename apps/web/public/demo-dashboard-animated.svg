    <text x="40" y="122" fill="#8b949e" font-size="11">Active Signals</text>
    <text x="40" y="152" fill="#e6edf3" font-size="28" font-weight="700">12</text>
    <text x="80" y="152" fill="#3fb950" font-size="12"> +3 today</text>

