name: Issue Claim & PR Auto-Review

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  # ─── Auto-assign when someone claims an issue ───────────────────────────────
  auto-assign-issue:
    name: Auto-assign issue claim
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request
    permissions:
      issues: write
    steps:
      - name: Check if claim comment and assign
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.toLowerCase();
            const claimPhrases = [
              "i'd like to work on",
              "i would like to work on",
              "i can work on",
              "i'll work on",
              "i will work on",
              "i can implement",
              "i'd like to take",
              "i want to work on",
              "assign this to me",
              "can i work on",
              "i'd like to fix",
              "i can fix",
              "i want to fix",
              "i want to take this",
              "i want to implement",
            ];

            const isClaim = claimPhrases.some(phrase => body.includes(phrase));
            if (!isClaim) return;

            const issue = context.payload.issue;
            const commenter = context.payload.comment.user.login;

            // Skip bots
            if (commenter.includes('[bot]') || commenter.includes('-bot')) return;

            // Check if already assigned
            if (issue.assignees && issue.assignees.length > 0) {
              const assignees = issue.assignees.map(a => a.login).join(', ');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Hey @${commenter}! This issue is already assigned to **${assignees}**.\n\nCheck out other [good first issues](https://github.com/${context.repo.owner}/${context.repo.repo}/issues?q=is%3Aopen+label%3A%22good+first+issue%22+no%3Aassignee) that are still available! 🙌`,
              });
              return;
            }

            // Assign the commenter
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [commenter],
              });
            } catch (e) {
              // Assignee might not be a collaborator — still reply
            }

            // Get issue label to customize message
            const labels = issue.labels.map(l => l.name);
            const isGoodFirstIssue = labels.includes('good first issue');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                `✅ Hey @${commenter}! This issue is yours — go for it!`,
                ``,
                isGoodFirstIssue
                  ? `👋 Looks like a **good first issue** — perfect starting point. Don't hesitate to ask questions here if you get stuck.`
                  : ``,
                ``,
                `**Getting started:**`,
                `\`\`\`bash`,
                `git clone https://github.com/${context.repo.owner}/${context.repo.repo}.git`,
                `cd tradeclaw`,
                `npm install`,
                `npm run dev`,
                `\`\`\``,
                ``,
                `**Before submitting your PR:**`,
                `- [ ] \`npm run build\` passes`,
                `- [ ] \`npm run lint\` passes`,
                `- [ ] Tested locally`,
                `- [ ] Branch from \`main\` and keep your branch up to date`,
                ``,
                `📖 Full guide: [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md)`,
                ``,
                `We look forward to your PR! ⚡`,
              ].filter(l => l !== undefined).join('\n'),
            });

  # ─── Auto-review PR when opened or updated ──────────────────────────────────
  auto-review-pr:
    name: Auto-review PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: apps/web

      - name: Run build check
        id: build
        run: npm run build
        working-directory: apps/web
        continue-on-error: true

      - name: Run lint check
        id: lint
        run: npm run lint
        working-directory: apps/web
        continue-on-error: true

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ steps.build.outcome }}';
            const lintStatus = '${{ steps.lint.outcome }}';
            const author = context.payload.pull_request.user.login;
            const isSync = context.payload.action === 'synchronize';

            const buildIcon = buildStatus === 'success' ? '✅' : '❌';
            const lintIcon = lintStatus === 'success' ? '✅' : lintStatus === 'skipped' ? '⚠️' : '❌';
            const allPass = buildStatus === 'success' && lintStatus === 'success';

            // Don't re-post on every sync — only on open or when something fails
            if (isSync && allPass) return;

            const body = [
              `## 🤖 Auto-Review for @${author}`,
              ``,
              `| Check | Status |`,
              `|-------|--------|`,
              `| 🔨 Build (\`npm run build\`) | ${buildIcon} ${buildStatus} |`,
              `| 🔍 Lint (\`npm run lint\`) | ${lintIcon} ${lintStatus} |`,
              ``,
              allPass
                ? `### ✅ All checks passed! A maintainer will review shortly.`
                : `### ❌ Some checks failed — please fix before merging.`,
              ``,
              !allPass ? [
                buildStatus !== 'success' ? `**Build failed** — run \`npm run build\` locally to reproduce and fix.` : '',
                lintStatus !== 'success' ? `**Lint failed** — run \`npm run lint\` locally to fix issues.` : '',
              ].filter(Boolean).join('\n') : '',
              ``,
              `> _Automated review by TradeClaw CI • [View run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }})_`,
            ].join('\n');

            // Find and update existing bot comment if exists
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🤖 Auto-Review')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
